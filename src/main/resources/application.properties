spring.application.name=rest-api
spring.config.import=optional:file:.env

# ============================================
# H2 DATABASE CONFIGURATION (Development Only)
# ============================================

# 1. Use H2 in-memory database by default, but allow overrides from .env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:authdb}

# 2. H2 driver class (tells Java how to talk to H2)
spring.datasource.driverClassName=org.h2.Driver

# 3. Default credentials (safe local defaults, override in .env when needed)
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# 4. Tell JPA: "Automatically create tables from my @Entity classes"
spring.jpa.hibernate.ddl-auto=create-drop

# 5. Optional: Show SQL in console (great for learning!)
spring.jpa.show-sql=true

# 6. Optional: Format SQL nicely
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# H2 CONSOLE (Web UI to browse database)
# ============================================

# 7. ENABLE the web console (disabled by default for security)
spring.h2.console.enabled=true

# 8. URL path to access it (default is /h2-console)
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
