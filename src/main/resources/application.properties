spring.application.name=rest-api

# ============================================
# H2 DATABASE CONFIGURATION (Development Only)
# ============================================

# 1. Tell Spring: "Use H2 in-memory database"
spring.datasource.url=jdbc:h2:mem:authdb

# 2. H2 driver class (tells Java how to talk to H2)
spring.datasource.driverClassName=org.h2.Driver

# 3. Default credentials (H2 requires these, even for in-memory)
spring.datasource.username=hira
spring.datasource.password=1234

# 4. Tell JPA: "Automatically create tables from my @Entity classes"
spring.jpa.hibernate.ddl-auto=create-drop

# 5. Optional: Show SQL in console (great for learning!)
spring.jpa.show-sql=true

# 6. Optional: Format SQL nicely
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# H2 CONSOLE (Web UI to browse database)
# ============================================

# 7. ENABLE the web console (disabled by default for security)
spring.h2.console.enabled=true

# 8. URL path to access it (default is /h2-console)
spring.h2.console.path=/h2-console

